version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cautela-postgres
    environment:
      POSTGRES_USER: cautela
      POSTGRES_PASSWORD: cautela
      POSTGRES_DB: cautela_mkt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: cautela-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
