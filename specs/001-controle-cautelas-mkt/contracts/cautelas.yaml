## Devolução

### POST /api/cautelas/:id/checklist-devolucao

Preenche o checklist de devolução.

**Request Body**: (mesmo formato do checklist de saída)
**Response 200**: (objeto cautela atualizado)
**Response 422**: Perguntas obrigatórias não respondidas

### POST /api/cautelas/:id/devolver

Registra a devolução da cautela.

**Request Body**:
```json
{
  "checklist_id": "uuid (required)",
  "respostas": [
    {
      "pergunta_id": "uuid (required)",
      "resposta": "boolean (required)"
    }
  ],
  "tem_avarias": "boolean (required)",
  "avarias_descricao": "string (required if tem_avarias = true)",
  "observacoes": "string"
}
```

**Pré-condições**:
- Cautela no status EM_USO ou ATRASADA
- Checklist de devolução completamente preenchido

**Response 200**:
```json
{
  "id": "uuid",
  "status": "FINALIZADA | PENDENTE",
  "data_retorno": "datetime (now)",
  "equipamentos": [
    { "id": "uuid", "status": "DISPONIVEL | AVARIADO" }
  ]
}
```

### POST /api/cautelas/:id/cancelar

Cancela uma cautela (ABERTA ou EM_USO → CANCELADA).

**Response 200**: `{ "id": "uuid", "status": "CANCELADA" }`
**Response 422**: Cautela não pode ser cancelada (status não permite)

---

## Detecção de Atrasos

**Scheduled Job** (cron a cada 1 minuto):

Verifica todas as cautelas onde:
- `status IN ('EM_USO')`
- `data_prevista_retorno < NOW()`
- `data_retorno IS NULL`

E atualiza `status = 'ATRASADA'`.
